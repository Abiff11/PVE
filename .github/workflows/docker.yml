name: Build and Push Docker Images

on:
  push:
    branches:
      - main      # Producción
      - develop   # Desarrollo

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "tag=develop" >> $GITHUB_OUTPUT
            echo "env=development" >> $GITHUB_OUTPUT
          fi

      # Build and push Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Back/project-pve
          file: ./Back/project-pve/Dockerfile
          push: true
          tags: abiff11/pve-backend:${{ steps.env.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Front/project-PVE
          file: ./Front/project-PVE/Dockerfile
          push: true
          tags: abiff11/pve-frontend:${{ steps.env.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ steps.env.outputs.env }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend image: abiff11/pve-backend:${{ steps.env.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend image: abiff11/pve-frontend:${{ steps.env.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
