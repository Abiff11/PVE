name: Build and Push Docker Images

on:
  push:
    branches:
      - main      # Producción
  workflow_dispatch:
    inputs:
      production_url:
        description: 'Production API URL (for main branch build)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set API URL for production
        id: api_url
        run: |
          # Use production URL from secret or input
          API_URL="${{ secrets.PRODUCTION_API_URL }}"
          if [[ -z "$API_URL" ]]; then
            API_URL="${{ github.event.inputs.production_url }}"
          fi
          if [[ -z "$API_URL" ]]; then
            echo "Warning: No production API URL set!"
            API_URL="http://localhost:3000"
          fi
          echo "url=$API_URL" >> $GITHUB_OUTPUT

      # Build and push Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Back/project-pve
          file: ./Back/project-pve/Dockerfile
          push: true
          tags: abiff11/pve-backend:latest
          no-cache: true

      # Build and push Frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Front/project-PVE
          file: ./Front/project-PVE/Dockerfile
          push: true
          tags: abiff11/pve-frontend:latest
          build-args: |
            VITE_API_URL=${{ steps.api_url.outputs.url }}
          no-cache: true

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: Production" >> $GITHUB_STEP_SUMMARY
          echo "- API URL: ${{ steps.api_url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend image: abiff11/pve-backend:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend image: abiff11/pve-frontend:latest" >> $GITHUB_STEP_SUMMARY
