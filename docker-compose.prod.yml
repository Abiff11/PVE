version: '3.8'

services:
  # Base de datos PostgreSQL - Producción
  postgres:
    image: postgres:14-alpine
    container_name: pve-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pve-network

  # Backend NestJS - Producción
  backend:
    build:
      context: ./Back/project-pve
      dockerfile: Dockerfile
      target: production
    container_name: pve-backend-prod
    restart: always
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      FRONT_ORIGINS: ${FRONTEND_URL:-https://pve-frontend.onrender.com}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pve-network

  # Frontend React + Nginx - Producción
  frontend:
    build:
      context: ./Front/project-PVE
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://backend:3000}
    container_name: pve-frontend-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pve-network

volumes:
  postgres_data:

networks:
  pve-network:
    driver: bridge
